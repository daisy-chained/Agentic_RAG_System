server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all /api requests to the Java control-plane.
    # Inside Docker Compose, "java-api" resolves via the internal DNS.
    location /api {
        proxy_pass         http://java-api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve the SPA — fall back to index.html for all unmatched routes so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

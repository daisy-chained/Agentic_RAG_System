name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Minimal token permissions — jobs only read repository contents.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Java control-plane
  # ---------------------------------------------------------------------------
  test-control-plane:
    name: Test – Control Plane (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orchestrator
          POSTGRES_USER: orchestrator
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U orchestrator"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        working-directory: control-plane
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orchestrator
          SPRING_DATASOURCE_USERNAME: orchestrator
          SPRING_DATASOURCE_PASSWORD: secret

      - name: Upload JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-test-report
          path: control-plane/target/surefire-reports/*.xml
          retention-days: 14

      - name: Upload JaCoCo HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-coverage
          path: control-plane/target/site/jacoco/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 2 – Python inference-engine
  # ---------------------------------------------------------------------------
  test-inference-engine:
    name: Test – Inference Engine (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: inference-engine/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r inference-engine/requirements-test.txt

      - name: Generate protobuf stubs
        run: |
          python3 -m grpc_tools.protoc \
            -I ./shared-protos \
            --python_out=./inference-engine \
            --grpc_python_out=./inference-engine \
            ./shared-protos/ai_service.proto

      - name: Run pytest
        run: pytest inference-engine/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3 – React / TypeScript frontend
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test – Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test -- --run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 4 – Docker image builds (validates containerisation)
  # ---------------------------------------------------------------------------
  validate-docker-builds:
    name: Validate – Docker Builds
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build inference-engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: inference-engine/Dockerfile
          push: false
          tags: agentic-rag/inference-engine:ci
          cache-from: type=gha,scope=inference-engine
          cache-to: type=gha,mode=max,scope=inference-engine

      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: control-plane/Dockerfile
          push: false
          tags: agentic-rag/control-plane:ci
          cache-from: type=gha,scope=control-plane
          cache-to: type=gha,mode=max,scope=control-plane

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: agentic-rag/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate compose.yaml
        run: docker compose config --quiet

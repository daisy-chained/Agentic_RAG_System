syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.ai.orchestrator.grpc";

service AiAgentService {
  // The main entry point for a RAG query
  rpc ProcessQuery (AgentQuery) returns (AgentResponse) {}

  // Ingests a document for vector retrieval
  rpc IndexDocument (IndexRequest) returns (IndexResponse) {}
}

message AgentQuery {
  string query = 1;
  string user_id = 2;
  repeated string session_history = 3;
}

message AgentResponse {
  string answer = 1;
  repeated string source_documents = 2;
  float confidence_score = 3;
  int64 latency_ms = 4;
}

message IndexRequest {
  string document_id = 1;
  string filename = 2;
  string user_id = 3;
  bytes file_content = 4;
}

message IndexResponse {
  int32 chunk_count = 1;
  string status = 2;
}